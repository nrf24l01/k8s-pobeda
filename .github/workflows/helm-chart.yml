name: Helm Chart

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "helm/k8s-pobeda-backend/**"
      - ".github/workflows/helm-chart.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  chart:
    runs-on: ubuntu-latest
    env:
      CHART_DIR: helm/k8s-pobeda-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Render chart
        run: helm template demo "${CHART_DIR}" >/dev/null

      - name: Compute chart package version
        id: version
        shell: bash
        run: |
          BASE_VERSION="$(helm show chart "${CHART_DIR}" | awk '/^version:/{print $2}')"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            CHART_VERSION="${BASE_VERSION}"
          else
            CHART_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::7}"
          fi

          echo "chart_version=${CHART_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Package chart
        run: |
          mkdir -p .chart-packages
          helm package "${CHART_DIR}" \
            --destination .chart-packages \
            --version "${{ steps.version.outputs.chart_version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR (OCI)
        shell: bash
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          helm push .chart-packages/*.tgz "oci://ghcr.io/${OWNER}/charts"
