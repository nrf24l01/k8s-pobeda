services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: k8s-pobeda-frontend:local
    container_name: k8s-pobeda-frontend
    environment:
      NUXT_PUBLIC_API_BASE_URL: /api
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: k8s-pobeda-backend:local
    container_name: k8s-pobeda-backend
    expose:
      - "8080"
    environment:
      HTTP_ADDR: ":8080"
      CORS_ALLOW_ORIGIN: "*"
      KUBECONFIG: /home/nonroot/.kube/config
    volumes:
      - ${HOME}/.kube:/home/nonroot/.kube:ro
    restart: unless-stopped

  gateway:
    image: nginx:1.28-alpine
    container_name: k8s-pobeda-gateway
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
