apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-pobeda-backend.fullname" . }}-gateway
  labels:
    {{- include "k8s-pobeda-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      location = /api {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "k8s-pobeda-backend.fullname" . }}:{{ .Values.service.port }}/api;
      }

      location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "k8s-pobeda-backend.fullname" . }}:{{ .Values.service.port }}/api/;
      }

      location /healthz {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "k8s-pobeda-backend.fullname" . }}:{{ .Values.service.port }}/healthz;
      }

      location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "k8s-pobeda-backend.fullname" . }}-frontend:3000;
      }
    }
